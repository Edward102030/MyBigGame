<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
  REALM ENGINE — index.html
  ═══════════════════════════════════════════════════════════════
  Integration Notes:
  · Loads styles.css (visual layer) then game.js (engine core)
  · game.js attaches to window.REALM and reads window.SHORTCUTS_SAVE
  · Apple Shortcuts injection: set window.SHORTCUTS_SAVE = "<json>"
    before this page loads, or call window.REALM.loadSave("<json>")
    at any time after DOMContentLoaded fires.
  · All HUD element IDs are referenced in game.js via REALM.hud.*
  · Canvas ID "realm-canvas" must not be renamed.
  ═══════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Realm Engine</title>
  <link rel="stylesheet" href="styles.css" />

  <!--
    ── Apple Shortcuts Save-State Hook ──────────────────────────
    Shortcuts can inject a save JSON string before page load by
    prepending a <script> tag:
      window.SHORTCUTS_SAVE = '{"turn":5,"tiles":[...]}';
    The engine checks this on init and calls loadSave() if present.
  -->
  <script>
    // Fallback: read save from localStorage if Shortcuts didn't inject it
    (function () {
      if (typeof window.SHORTCUTS_SAVE === 'undefined') {
        var stored = localStorage.getItem('realm_save');
        if (stored) window.SHORTCUTS_SAVE = stored;
      }
    })();
  </script>
</head>

<body>

  <!-- ── Canvas Viewport ─────────────────────────────────────── -->
  <canvas id="realm-canvas" aria-label="Realm isometric game world"></canvas>

  <!-- ── HUD Overlay ────────────────────────────────────────── -->
  <div id="hud" aria-label="Heads-up display">

    <!-- Top resource bar -->
    <div id="hud-top">
      <div class="hud-resource" id="res-gold">
        <span class="res-icon">⚜</span>
        <span class="res-label">GOLD</span>
        <span class="res-value" id="val-gold">0</span>
      </div>
      <div class="hud-resource" id="res-food">
        <span class="res-icon">🌾</span>
        <span class="res-label">FOOD</span>
        <span class="res-value" id="val-food">0</span>
      </div>
      <div class="hud-resource" id="res-prod">
        <span class="res-icon">⚒</span>
        <span class="res-label">PROD</span>
        <span class="res-value" id="val-prod">0</span>
      </div>
      <div class="hud-resource" id="res-turn">
        <span class="res-icon">⏳</span>
        <span class="res-label">TURN</span>
        <span class="res-value" id="val-turn">1</span>
      </div>
    </div>

    <!-- Level & era progress bar -->
    <div id="hud-progress-bar">
      <div id="hud-era-label">Age of Iron</div>
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="hud-level-label">Lvl <span id="val-level">1</span></div>
    </div>

    <!-- Bottom action panel -->
    <div id="hud-bottom">
      <button class="hud-btn" id="btn-end-turn" onclick="window.REALM && window.REALM.endTurn()">
        END TURN
      </button>
      <button class="hud-btn" id="btn-build" onclick="window.REALM && window.REALM.openBuildMenu()">
        BUILD
      </button>
      <button class="hud-btn secondary" id="btn-save" onclick="window.REALM && window.REALM.saveGame()">
        SAVE
      </button>
      <button class="hud-btn secondary" id="btn-menu" onclick="window.REALM && window.REALM.toggleMenu()">
        ☰
      </button>
    </div>

    <!-- Tile info tooltip -->
    <div id="tile-info" class="hidden">
      <div id="tile-info-name">—</div>
      <div id="tile-info-stats">—</div>
      <button id="tile-info-close" onclick="document.getElementById('tile-info').classList.add('hidden')">✕</button>
    </div>

    <!-- Build menu overlay -->
    <div id="build-menu" class="hidden">
      <div class="menu-header">Construct Building</div>
      <div id="build-list"><!-- populated by game.js --></div>
      <button class="hud-btn secondary" onclick="window.REALM && window.REALM.closeBuildMenu()">Cancel</button>
    </div>

    <!-- Game menu overlay -->
    <div id="game-menu" class="hidden">
      <div class="menu-header">Menu</div>
      <button class="hud-btn menu-item" onclick="window.REALM && window.REALM.saveGame()">Save Game</button>
      <button class="hud-btn menu-item" onclick="window.REALM && window.REALM.newGame()">New Game</button>
      <button class="hud-btn secondary menu-item" onclick="window.REALM && window.REALM.toggleMenu()">Close</button>
    </div>

    <!-- Notification toast -->
    <div id="toast" class="hidden"></div>

    <!-- Combat log -->
    <div id="combat-log" class="hidden">
      <div class="menu-header">Combat Report</div>
      <div id="combat-log-body"></div>
      <button class="hud-btn secondary" onclick="document.getElementById('combat-log').classList.add('hidden')">Dismiss</button>
    </div>

  </div><!-- /#hud -->

  <script src="game.js"></script>

</body>
</html>
